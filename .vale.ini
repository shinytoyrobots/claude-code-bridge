StylesPath = .vale/styles
MinAlertLevel = suggestion

Packages = Microsoft
Vocab = Provider-Kit

[*.md]
BasedOnStyles = Vale, Microsoft

# "agent" is correct terminology in AI/ML context
Microsoft.Terms = NO

# Spaced em dashes (` — `) are intentional house style
Microsoft.Dashes = NO

# Project name and section headings use lowercase by design
Microsoft.Headings = NO

# "Why?" and "Is this allowed?" are intentional rhetorical headings
Microsoft.HeadingPunctuation = NO

# Domain acronyms (MCP, ASGI, LLM, MIT) are standard for the audience
Microsoft.Acronyms = NO

# Model names use mixed casing (DeepSeek brand vs deepseek-v4-pro model ID)
Vale.Terms = NO
